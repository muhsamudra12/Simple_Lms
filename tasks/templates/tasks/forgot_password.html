<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lupa Password | LMS Academy</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0f2c'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='%23f59e0b'%3E🎓%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
    <style>
      :root {
        --navy: #0a0f2c;
        --navy-mid: #141a3d;
        --blue: #2563eb;
        --blue-light: #3b82f6;
        --accent: #f59e0b;
        --accent-light: #fcd34d;
        --surface-card: #ffffff;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --radius: 18px;
      }
      * { font-family: 'Plus Jakarta Sans', sans-serif; }
      body {
        background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 55%, #1e3a8a 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        margin: 0;
      }
      .brand-link {
        display: inline-flex; align-items: center; gap: 8px;
        font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: #fff;
        text-decoration: none; margin-bottom: 28px;
      }
      .brand-link span { color: var(--accent); }
      .auth-card {
        background: var(--surface-card);
        border-radius: var(--radius);
        padding: 36px 32px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      }
      .auth-card h1 { font-size: 1.4rem; font-weight: 800; color: var(--text-main); margin-bottom: 4px; }
      .auth-card p.subtitle { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 24px; }
      .form-label { font-size: 0.8rem; font-weight: 700; color: var(--text-main); }
      .form-control { border-radius: 10px; padding: 10px 14px; border: 1px solid #e2e8f0; font-size: 0.9rem; }
      .form-control:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
      .btn-auth {
        background: var(--accent); color: var(--navy); font-weight: 700; border-radius: 10px;
        padding: 11px; border: none; width: 100%; transition: background 0.2s;
      }
      .btn-auth:hover { background: var(--accent-light); }
      .auth-footer { text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 20px; }
      .auth-footer a { color: var(--blue); font-weight: 700; text-decoration: none; }
      .alert-custom {
        border: none; border-radius: 10px; padding: 12px 16px; font-size: 0.825rem; font-weight: 600;
        display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 18px;
      }
      .alert-success-custom { background: #f0fdf4; color: #15803d; border-left: 4px solid #22c55e; }
      .alert-error-custom { background: #fef2f2; color: #b91c1c; border-left: 4px solid #ef4444; }
    </style>
  </head>
  <body>
    <div class="d-flex flex-column align-items-center">
      <a href="{% url 'index' %}" class="brand-link"><i class="bi bi-mortarboard-fill"></i>LMS <span>Academy</span></a>
      <div class="auth-card">
        <h1>Lupa Password</h1>
        <p class="subtitle">Masukkan email yang dipakai daftar, kami kirimkan link reset password.</p>

        {% if messages %}
          {% for message in messages %}
            {% if message.tags == 'error' %}
            <div class="alert-custom alert-error-custom"><i class="bi bi-exclamation-circle-fill"></i> {{ message }}</div>
            {% else %}
            <div class="alert-custom alert-success-custom"><i class="bi bi-patch-check-fill"></i> {{ message }}</div>
            {% endif %}
          {% endfor %}
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          <div class="mb-4">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="emailkamu@contoh.com" required autofocus />
          </div>
          <button type="submit" class="btn-auth"><i class="bi bi-send-fill me-1"></i>Kirim Link Reset</button>
        </form>

        <div class="auth-footer">
          <a href="{% url 'login_page' %}"><i class="bi bi-arrow-left me-1"></i>Kembali ke Login</a>
        </div>
      </div>
    </div>

    <script>
      // Auto-dismiss notifikasi setelah beberapa detik.
      document.querySelectorAll('.alert-custom').forEach(function (alertEl, i) {
        setTimeout(function () {
          alertEl.style.transition = 'opacity 0.4s ease, max-height 0.4s ease, margin 0.4s ease, padding 0.4s ease';
          alertEl.style.opacity = '0';
          alertEl.style.maxHeight = '0';
          alertEl.style.overflow = 'hidden';
          alertEl.style.marginBottom = '0';
          alertEl.style.paddingTop = '0';
          alertEl.style.paddingBottom = '0';
          setTimeout(function () { alertEl.remove(); }, 400);
        }, 4000 + i * 300);
      });
    </script>
  </body>
</html>
