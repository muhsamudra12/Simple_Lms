<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar | LMS Academy</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0f2c'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='%23f59e0b'%3E🎓%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
    <style>
      :root {
        --navy: #0a0f2c;
        --navy-mid: #141a3d;
        --blue: #2563eb;
        --blue-light: #3b82f6;
        --accent: #f59e0b;
        --accent-light: #fcd34d;
        --surface: #f0f4ff;
        --surface-card: #ffffff;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --radius: 18px;
      }
      * { font-family: 'Plus Jakarta Sans', sans-serif; }
      body {
        background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 55%, #1e3a8a 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .brand-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: 'DM Serif Display', serif;
        font-size: 1.5rem;
        color: #fff;
        text-decoration: none;
        margin-bottom: 28px;
      }
      .brand-link span { color: var(--accent); }
      .auth-card {
        background: var(--surface-card);
        border-radius: var(--radius);
        padding: 36px 32px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      }
      .auth-card h1 {
        font-size: 1.4rem;
        font-weight: 800;
        color: var(--text-main);
        margin-bottom: 4px;
      }
      .auth-card p.subtitle {
        color: var(--text-muted);
        font-size: 0.875rem;
        margin-bottom: 24px;
      }
      .form-label {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--text-main);
      }
      .form-control {
        border-radius: 10px;
        padding: 10px 14px;
        border: 1px solid #e2e8f0;
        font-size: 0.9rem;
      }
      .form-control:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
      }
      .btn-auth {
        background: var(--accent);
        color: var(--navy);
        font-weight: 700;
        border-radius: 10px;
        padding: 11px;
        border: none;
        width: 100%;
        transition: background 0.2s;
      }
      .btn-auth:hover { background: var(--accent-light); }
      .auth-footer {
        text-align: center;
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 20px;
      }
      .auth-footer a {
        color: var(--blue);
        font-weight: 700;
        text-decoration: none;
      }
      .toast-container {
        position: fixed; top: 20px; right: 20px; z-index: 2000;
        display: flex; flex-direction: column; gap: 10px; max-width: 360px;
      }
      .toast-msg {
        background: #fff; border-radius: 10px; padding: 14px 16px; font-size: 0.85rem;
        font-weight: 600; display: flex; align-items: flex-start; gap: 10px;
        box-shadow: 0 10px 30px rgba(10,15,44,0.18); animation: toast-in 0.35s ease;
      }
      .toast-success { border-left: 4px solid #22c55e; color: #15803d; }
      .toast-error { border-left: 4px solid #ef4444; color: #b91c1c; }
      @keyframes toast-in {
        from { opacity: 0; transform: translateY(-10px) translateX(20px); }
        to { opacity: 1; transform: translateY(0) translateX(0); }
      }
      @media (max-width: 575.98px) {
        .toast-container { left: 12px; right: 12px; top: 12px; max-width: none; }
      }
      .password-wrap { position: relative; }
      .password-wrap input { padding-right: 42px; }
      .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 4px;
        font-size: 1rem;
        line-height: 1;
      }
      .password-toggle:hover { color: var(--blue); }
      .row-2 { display: flex; gap: 12px; }
      .row-2 > div { flex: 1; }
    </style>
  </head>
  <body>
    <div class="d-flex flex-column align-items-center">
      <a href="{% url 'index' %}" class="brand-link"><i class="bi bi-mortarboard-fill"></i>LMS <span>Academy</span></a>
      <div class="auth-card">
        <h1>Buat Akun Baru</h1>
        <p class="subtitle">Gratis, dan cuma butuh waktu kurang dari semenit.</p>

        {% if messages %}
        <div class="toast-container">
          {% for message in messages %}
            {% if message.tags == 'error' %}
            <div class="toast-msg toast-error"><i class="bi bi-exclamation-circle-fill"></i> <span>{{ message }}</span></div>
            {% else %}
            <div class="toast-msg toast-success"><i class="bi bi-patch-check-fill"></i> <span>{{ message }}</span></div>
            {% endif %}
          {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" name="fullname" class="form-control" placeholder="Nama kamu" value="{{ fullname|default:'' }}" required autofocus />
          </div>
          <div class="row-2 mb-3">
            <div>
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" placeholder="username" value="{{ username|default:'' }}" required />
            </div>
            <div>
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" placeholder="email@kamu.com" value="{{ email|default:'' }}" required />
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="password-wrap">
              <input type="password" name="password" id="passwordInput" class="form-control" placeholder="••••••••" required minlength="6" />
              <button type="button" class="password-toggle" onclick="togglePassword('passwordInput', this)">
                <i class="bi bi-eye-fill"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-auth"><i class="bi bi-person-plus-fill me-1"></i>Daftar Sekarang</button>
        </form>

        <div class="auth-footer">
          Sudah punya akun? <a href="{% url 'login_page' %}">Masuk di sini</a>
        </div>
      </div>
    </div>
    <script>
      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.className = 'bi bi-eye-slash-fill';
        } else {
          input.type = 'password';
          icon.className = 'bi bi-eye-fill';
        }
      }
    
      // Auto-dismiss toast notifikasi setelah beberapa detik. Pesan error
      // dikasih waktu lebih lama (7 detik) daripada sukses (4 detik) biar
      // user punya cukup waktu baca sebelum hilang sendiri.
      document.querySelectorAll('.toast-msg').forEach(function (toastEl, i) {
        var delay = toastEl.classList.contains('toast-error') ? 7000 : 4000;
        setTimeout(function () {
          toastEl.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
          toastEl.style.opacity = '0';
          toastEl.style.transform = 'translateX(30px)';
          setTimeout(function () { toastEl.remove(); }, 350);
        }, delay + i * 300);
      });
    </script>
  </body>
</html>
